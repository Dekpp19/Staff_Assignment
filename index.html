<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ward 15E – Bangkok Hospital Pattaya</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#003087;--blue-mid:#1e4fa0;--blue-light:#e8eef8;
  --night:#1a2a5e;--night-mid:#2c3e7a;
  --accent:#e63027;--border:#d0d8ea;--bg:#eef1f8;
  --surface:#fff;--muted:#6070a0;--text:#1a2340;
  --row-alt:#f5f8ff;--section-h:#dce7f7;--r:8px;
  --hist-bg:#f0f4ff;--hist-border:#b8c8e8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:16px;min-height:100vh}

.topbar{background:var(--blue);color:#fff;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.22)}
.brand{display:flex;align-items:center;gap:16px}
.brand-text h1{font-size:20px;font-weight:700}
.brand-text p{font-size:13px;opacity:.72;margin-top:2px}
.topbar-right{display:flex;gap:10px;align-items:center}
.tbtn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:7px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.tbtn-white{background:#fff;color:var(--blue)}.tbtn-white:hover{background:#d8e4f8}
.tbtn-red{background:var(--accent);color:#fff}.tbtn-red:hover{filter:brightness(1.1)}
.tbtn-ghost{background:rgba(255,255,255,.13);color:#fff;border:1.5px solid rgba(255,255,255,.38)}.tbtn-ghost:hover{background:rgba(255,255,255,.22)}

.cbar{background:#fff;border-bottom:2px solid var(--border);padding:16px 40px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.clabel{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
input[type=date],select{font-family:'Sarabun',sans-serif;font-size:15px;border:1.5px solid var(--border);border-radius:7px;padding:9px 14px;background:#fff;color:var(--text);outline:none;transition:border .15s}
input[type=date]:focus,select:focus{border-color:var(--blue)}

.shift-btn{padding:10px 26px;border-radius:7px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.18s;border:1.5px solid var(--border);background:#f5f7fc;color:var(--muted)}
.shift-btn.active-day{background:var(--blue);color:#fff;border-color:var(--blue)}
.shift-btn.active-night{background:var(--night);color:#fff;border-color:var(--night)}

.hist-panel{background:var(--hist-bg);border:1.5px solid var(--hist-border);border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-left:auto}
.hist-panel-label{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.hist-date-input{font-family:'Sarabun',sans-serif;font-size:15px;border:1.5px solid var(--hist-border);border-radius:7px;padding:9px 14px;background:#fff;color:var(--text);outline:none;transition:border .15s}
.hist-date-input:focus{border-color:var(--blue)}
.hist-shift-group{display:flex;gap:6px}
.hsbtn{padding:9px 18px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--hist-border);background:#fff;color:var(--muted);font-family:inherit;transition:.15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hsbtn:hover{border-color:var(--blue);color:var(--blue);background:#e8eeff}
.hsbtn.hs-active-day{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(0,48,135,.25)}
.hsbtn.hs-active-night{background:var(--night);color:#fff;border-color:var(--night);box-shadow:0 2px 8px rgba(26,42,94,.25)}
.hist-go-btn{padding:9px 18px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--blue);color:#fff;font-family:inherit;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.hist-go-btn:hover{background:#1e4fa0}
.hist-divider{width:1px;height:28px;background:var(--hist-border)}

.hist-banner{display:none;background:#fff3cd;border:1.5px solid #f0c050;border-radius:8px;padding:12px 20px;margin:12px 40px;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hist-banner.show{display:flex}
.hist-banner-text{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#7a5c00}
.hist-banner-badge{background:#f0c050;color:#5a3e00;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700}
.hist-banner-actions{display:flex;gap:8px;flex-wrap:wrap}
.hist-action-btn{padding:8px 18px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:6px;border:none}
.hist-edit-btn{background:var(--blue);color:#fff}.hist-edit-btn:hover{filter:brightness(1.1)}
.hist-edit-btn.editing{background:#1a7a3c;color:#fff}
.hist-del-btn{background:var(--accent);color:#fff}.hist-del-btn:hover{filter:brightness(1.1)}
.hist-save-btn{background:#1a7a3c;color:#fff}.hist-save-btn:hover{filter:brightness(1.1)}

.loading-bar{display:none;background:var(--blue);color:#fff;text-align:center;padding:8px;font-size:14px;font-weight:600}
.loading-bar.show{display:block}

body.hist-readonly .ci,
body.hist-readonly .cs,
body.hist-readonly .inc-table input,
body.hist-readonly .inc-table textarea,
body.hist-readonly .occ-table input,
body.hist-readonly .inc-table input[type=radio]{pointer-events:none;opacity:.7}
body.hist-readonly .add-row-btn{display:none}

.page{padding:20px 40px 80px;max-width:1500px;margin:0 auto}
.page-title{text-align:center;font-size:22px;font-weight:700;color:var(--blue);margin-bottom:24px}
.card{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 14px rgba(0,48,135,.10);margin-bottom:24px;border:1.5px solid var(--border)}
.card-header{padding:15px 24px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:700;font-size:18px}
.card-header.day{background:var(--blue)}
.card-header.night{background:var(--night)}
.card-header.section{background:var(--section-h);color:var(--blue);font-size:16px;padding:12px 20px}
.tbl{width:100%;border-collapse:collapse;font-size:15px}
.tbl th{background:var(--blue-mid);color:#fff;padding:10px 14px;text-align:center;font-weight:600;border:1px solid #2a4a9a;white-space:nowrap;font-size:14px}
.night-tbl th{background:var(--night-mid);border-color:#1a2a6a}
.tbl td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle}
.tbl tr:nth-child(even) td{background:var(--row-alt)}
.tbl tr:hover td{background:var(--blue-light)}
.tbl td.num{text-align:center;color:var(--muted);font-weight:600;width:38px;font-size:14px}
.ci,.cs{width:100%;border:none;background:transparent;font-family:'Sarabun',sans-serif;font-size:15px;color:var(--text);outline:none;padding:3px 6px}
.ci:focus,.cs:focus{background:#eef3ff;border-radius:4px}
.inc-wrap{border-top:2px solid var(--border)}
.inc-title{padding:13px 22px;background:#2c3e6b;color:#fff;font-size:16px;font-weight:700}
.inc-table{width:100%;border-collapse:collapse;font-size:15px}
.inc-table td{border:1px solid var(--border);padding:10px 16px;vertical-align:top}
.inc-table .criteria-header td{background:#2c3e6b;color:#fff;font-weight:700;font-size:15px;padding:11px 16px;border:1px solid #1a2a5e}
.yes-box{margin-top:8px;display:none}
.yes-box.show{display:block}
.yes-box textarea{width:100%;min-height:46px;resize:vertical;border:1.5px solid var(--blue-mid);border-radius:5px;padding:7px 11px;font-family:'Sarabun',sans-serif;font-size:15px;background:#f0f5ff;outline:none}
.occ-wrap{border-top:1px solid var(--border)}
.occ-table{width:100%;border-collapse:collapse;font-size:15px}
.occ-table th{background:#2c3e6b;color:#fff;padding:10px 16px;font-weight:600;font-size:14px}
.occ-table td{border:1px solid var(--border);padding:8px 12px}
.occ-table td.occ-label{width:20%;font-size:14px}
.occ-table td.occ-hn{width:30%}
.occ-table td.occ-hn input{width:100%;border:none;background:transparent;font-family:'Sarabun',sans-serif;font-size:15px;outline:none}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:34px;width:500px;max-height:84vh;overflow-y:auto;box-shadow:0 10px 50px rgba(0,0,0,.22)}
.modal h3{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:20px}
.mfield{margin-bottom:14px}
.mfield label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.mfield input,.mfield select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:7px;font-family:'Sarabun',sans-serif;font-size:15px}
.staff-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border:1px solid var(--border);border-radius:7px;margin-bottom:8px;background:var(--row-alt)}
.si-name{font-size:15px;font-weight:500}
.si-role{font-size:13px;color:var(--muted)}
.del-btn{background:none;border:none;cursor:pointer;color:#c0392b;font-size:20px;padding:0 5px}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}

.confirm-modal{background:#fff;border-radius:14px;padding:34px;width:440px;box-shadow:0 10px 50px rgba(0,0,0,.22);text-align:center}
.confirm-modal .ci-icon{font-size:48px;margin-bottom:14px}
.confirm-modal h3{font-size:20px;font-weight:700;color:#c0392b;margin-bottom:10px}
.confirm-modal p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:24px}
.confirm-modal .cm-btns{display:flex;justify-content:center;gap:12px}
.cm-cancel{padding:11px 28px;border-radius:7px;border:1.5px solid #ccc;background:#f5f5f5;color:#555;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.cm-cancel:hover{background:#eee}
.cm-confirm{padding:11px 28px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.cm-confirm:hover{filter:brightness(1.1)}

#toast{position:fixed;bottom:28px;right:28px;padding:14px 26px;border-radius:8px;font-size:15px;font-weight:600;display:none;z-index:600;box-shadow:0 3px 18px rgba(0,0,0,.15)}
#toast.ok{background:#e8f5ec;color:#1a7a3c;border:1px solid #a8d5b5;display:block}
#toast.err{background:#fdecea;color:#c0392b;border:1px solid #f5bbb6;display:block}
#toast.info{background:#e8f0fe;color:#003087;border:1px solid #a8c0f0;display:block}

@media print{.topbar,.cbar,.hist-banner,.loading-bar{display:none !important}.page{padding:8px;max-width:100%}}
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar">⏳ กำลังโหลดข้อมูล...</div>

<div class="topbar">
  <div class="brand">
    <div class="brand-text">
      <h1>Ward 15E – Staff Assignment</h1>
      <p>Bangkok Hospital Pattaya</p>
    </div>
  </div>
  <div class="topbar-right">
    <button class="tbtn tbtn-ghost" onclick="openModal()">+ รายชื่อ</button>
    <button class="tbtn tbtn-white" onclick="saveData()">💾 บันทึก</button>
    <button class="tbtn tbtn-red" onclick="window.print()">🖨 พิมพ์</button>
  </div>
</div>

<div class="cbar">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="clabel">วันที่</span>
    <input type="date" id="sel-date" onchange="onDateChange()">
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="clabel">เวลา</span>
    <div style="display:flex;gap:8px">
      <button class="shift-btn active-day" id="tab-day" onclick="setShift('day')">☀️ 07:00–19:00</button>
      <button class="shift-btn" id="tab-night" onclick="setShift('night')">🌙 19:00–07:00</button>
    </div>
  </div>
  <div class="hist-panel">
    <div class="hist-panel-label">🕘 ดูย้อนหลัง</div>
    <div class="hist-divider"></div>
    <input type="date" id="hist-date" class="hist-date-input">
    <div class="hist-shift-group">
      <button class="hsbtn hs-active-day" id="hbtn-day" onclick="setHistShift('day')">☀️ 07:00–19:00</button>
      <button class="hsbtn" id="hbtn-night" onclick="setHistShift('night')">🌙 19:00–07:00</button>
    </div>
    <button class="hist-go-btn" onclick="jumpToHist()">🔍 เปิดดู</button>
  </div>
</div>

<div class="hist-banner" id="hist-banner">
  <div class="hist-banner-text">
    <span class="hist-banner-badge">📅 ย้อนหลัง</span>
    <span id="hist-banner-info">—</span>
  </div>
  <div class="hist-banner-actions">
    <button class="hist-action-btn hist-edit-btn" id="hist-edit-btn" onclick="toggleEditMode()">✏️ แก้ไข</button>
    <button class="hist-action-btn hist-save-btn" id="hist-save-btn" style="display:none" onclick="saveHistEdits()">💾 บันทึกการแก้ไข</button>
    <button class="hist-action-btn hist-del-btn" onclick="confirmDeleteHist()">🗑 ลบข้อมูลนี้</button>
    <button class="hist-action-btn" style="background:#eee;color:#444;border:1.5px solid #ccc" onclick="exitHistMode()">✕ ออก</button>
  </div>
</div>

<div class="page">
  <div class="page-title" id="page-title">—</div>
  <div id="shift-content"></div>
</div>

<!-- STAFF MODAL -->
<div class="overlay" id="staff-overlay">
  <div class="modal">
    <h3>👤 จัดการรายชื่อบุคลากร</h3>
    <div class="mfield">
      <label>ชื่อ-สกุล / ตำแหน่ง</label>
      <input type="text" id="new-name" placeholder="เช่น กนกวรรณ RN3*">
    </div>
    <div class="mfield">
      <label>ประเภท</label>
      <select id="new-role">
        <option value="RN">RN – พยาบาลวิชาชีพ</option>
        <option value="PN">PN – พยาบาลเทคนิค</option>
        <option value="AUX">เดขา / ผู้ช่วย</option>
      </select>
    </div>
    <button class="tbtn tbtn-white" style="border:1.5px solid var(--blue);color:var(--blue);margin-bottom:18px" onclick="addStaff()">+ เพิ่ม</button>
    <div id="staff-list-ui"></div>
    <div class="modal-btns">
      <button class="tbtn" style="background:#eee;color:#333;border:1.5px solid #ccc" onclick="closeModal()">ปิด</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirm-overlay">
  <div class="confirm-modal">
    <div class="ci-icon">⚠️</div>
    <h3>ยืนยันการลบข้อมูล?</h3>
    <p id="confirm-desc">ข้อมูลจะถูกลบถาวร ไม่สามารถกู้คืนได้</p>
    <div class="cm-btns">
      <button class="cm-cancel" onclick="closeConfirm()">ยกเลิก</button>
      <button class="cm-confirm" onclick="doDelete()">ลบข้อมูล</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ══════════════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:            "AIzaSyD2-2kU0LXgirj4oSdK3hcSRAhAjtGJhyc",
  authDomain:        "staff-assignment-ba451.firebaseapp.com",
  databaseURL:       "https://staff-assignment-ba451-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "staff-assignment-ba451",
  storageBucket:     "staff-assignment-ba451.firebasestorage.app",
  messagingSenderId: "980707484583",
  appId:             "1:980707484583:web:8d1d780d8e72d611628c82"
};

// ── Ward identifier (เปลี่ยนได้ตามต้องการ) ──
const WARD_ID = 'ward15e';

let db = null;
try {
  firebase.initializeApp(FB_CONFIG);
  db = firebase.database();
} catch(e) {
  console.warn('Firebase init error:', e.message);
}

// ══════════════════════════════════════════════════════
// WARD REF HELPERS  (เหมือนโครงสร้าง Bed Exit Alarm)
// ══════════════════════════════════════════════════════
// path ข้อมูลกะ:    wards/ward15e/staffAssignment/{docKey}
// path รายชื่อ:     wards/ward15e/staffList
function wardRef(path) {
  const base = 'wards/' + WARD_ID;
  return path ? db.ref(base + '/' + path) : db.ref(base);
}
function shiftRef(key) { return wardRef('staffAssignment/' + key); }
function staffListRef()  { return wardRef('staffList'); }

async function fbGet(key) {
  if (!db) return null;
  try {
    const snap = await shiftRef(key).get();
    return snap.exists() ? snap.val() : null;
  } catch(e) { return null; }
}
async function fbSet(key, data) {
  if (!db) throw new Error('ไม่ได้เชื่อมต่อ Firebase');
  await shiftRef(key).set({ ...data, updatedAt: new Date().toISOString() });
}
async function fbDelete(key) {
  if (!db) return;
  await shiftRef(key).remove();
}

// ══════════════════════════════════════════════════════
// REAL-TIME LISTENER
// ══════════════════════════════════════════════════════
let _rtRef = null, _rtKey = null, _isSaving = false, _skipNext = false, _initialLoad = true;

function subscribeRealtime(date, shift) {
  if (!db) return;
  const key = docKey(date, shift);
  if (_rtKey === key) return;
  unsubscribeRealtime();
  _rtKey = key; _initialLoad = true;
  _rtRef = shiftRef(key);
  _rtRef.on('value', snap => {
    if (isHistMode) return;
    if (_skipNext) { _skipNext = false; return; }
    const data = snap.exists() ? snap.val() : null;
    if (!data) return;
    if (_initialLoad) {
      _initialLoad = false;
      document.getElementById('shift-content').innerHTML = buildShiftHTML(shift, data);
      restoreData(data, shift);
      saveLocal(data);
      return;
    }
    mergeRemoteData(data, shift);
    saveLocal(data);
    showToast('🔄 อัปเดตจากเครื่องอื่น', 'info');
  }, e => console.warn('RT listener error:', e));
}

function unsubscribeRealtime() {
  if (_rtRef) { _rtRef.off('value'); _rtRef = null; _rtKey = null; }
}

function mergeRemoteData(data, shift) {
  const focused = document.activeElement;
  ['rn','pn','aux'].forEach(role => {
    const rows  = data[role] || [];
    const tbody = document.getElementById(`${role}-${shift}`);
    if (!tbody) return;
    if (rows.length > tbody.rows.length) {
      const roleMap = {rn:'RN',pn:'PN',aux:'AUX'};
      const filtered = staff.filter(s => s.role === roleMap[role]);
      while (tbody.rows.length < rows.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = buildRowInner(tbody.rows.length + 1, `${role}-${shift}`, filtered);
        tbody.appendChild(tr);
      }
    }
    rows.forEach((rd, i) => {
      const tr = tbody.rows[i]; if (!tr) return;
      tr.querySelectorAll('[data-f]').forEach(el => {
        if (el === focused) return;
        if (rd[el.dataset.f] !== undefined) el.value = rd[el.dataset.f] || '';
      });
    });
  });
  if (data.incidents) INC_ROWS.forEach(r => {
    if (!r.hasRadio) return;
    const inc = data.incidents[r.k]; if (!inc) return;
    const radio = document.querySelector(`input[name="${shift}_${r.k}"][value="${inc.v}"]`);
    if (radio && radio !== focused) { radio.checked = true; toggleYes(`${shift}_${r.k}`, inc.v === 'yes'); }
    const txt = document.getElementById(`yt_${shift}_${r.k}`);
    if (txt && txt !== focused && inc.t !== undefined) txt.value = inc.t;
  });
  if (data.occurrences) [...OCC1,...OCC2].forEach(r => {
    const el = document.getElementById(`oc_${shift}_${r.k}`);
    if (el && el !== focused && data.occurrences[r.k] !== undefined) el.value = data.occurrences[r.k];
  });
}

// ══════════════════════════════════════════════════════
// STAFF  – โหลด/บันทึกจาก Firebase เป็นหลัก
// ══════════════════════════════════════════════════════
const DEFAULT_STAFF = [
  {id:'s1',  name:'กนกวรรณ RN3*', role:'RN'},
  {id:'s2',  name:'ศิริวรรณ RN3',  role:'RN'},
  {id:'s3',  name:'มยุรา RN4*',    role:'RN'},
  {id:'s4',  name:'แก้วดา RN4*',   role:'RN'},
  {id:'s5',  name:'อนงค์ RN4*',    role:'RN'},
  {id:'s6',  name:'ชลธิชา RN3',    role:'RN'},

// บันทึก staff ทั้ง localStorage และ Firebase
async function saveStaff() {
  localStorage.setItem('w15e_staff', JSON.stringify(staff));
  if (!db) return;
  try {
    await staffListRef().set({ list: staff, updatedAt: new Date().toISOString() });
  } catch(e) {
    console.warn('saveStaff Firebase error:', e.message);
  }
}

// โหลด staff จาก Firebase (ถ้ามี) แล้วอัปเดต local
async function loadStaffFromFirebase() {
  if (!db) return;
  try {
    const snap = await staffListRef().get();
    if (snap.exists()) {
      const data = snap.val();
      const list = data.list || data; // รองรับทั้ง format เก่าและใหม่
      if (Array.isArray(list) && list.length > 0) {
        staff = list;
        localStorage.setItem('w15e_staff', JSON.stringify(staff));
      }
    } else {
      // Firebase ว่าง → เอา default ขึ้นไปเก็บ
      await staffListRef().set({ list: staff, updatedAt: new Date().toISOString() });
    }
  } catch(e) {
    console.warn('loadStaff Firebase error:', e.message);
  }
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function thaiDate(str) {
  if (!str) return '—';
  return new Date(str + 'T00:00:00').toLocaleDateString('th-TH', {year:'numeric',month:'long',day:'numeric'});
}
function docKey(date, shift) { return `${date.replace(/-/g,'')}_${shift}`; }
function showLoading(show) { document.getElementById('loading-bar').classList.toggle('show', show); }

async function init() {
  const today = todayStr();
  document.getElementById('sel-date').value  = today;
  document.getElementById('hist-date').value = today;
  currentDate  = today;
  currentShift = 'day';
  setHistShift('day');
  updateShiftButtons('day');

  // แสดง local ก่อนให้หน้าไม่ว่าง
  const local = loadLocal();
  document.getElementById('page-title').textContent = '☀️ 07:00–19:00 น. — ' + thaiDate(today);
  document.getElementById('shift-content').innerHTML = buildShiftHTML('day', local);
  restoreData(local, 'day');

  // โหลด staff จาก Firebase (อัปเดต dropdown)
  showLoading(true);
  await loadStaffFromFirebase();
  showLoading(false);

  // Rebuild หน้าด้วย staff ล่าสุด แล้ว subscribe realtime
  renderPageLocal();
  subscribeRealtime(today, 'day');
}

async function jumpToHist() {
  const histDate = document.getElementById('hist-date').value;
  if (!histDate) { showToast('⚠ กรุณาเลือกวันที่ก่อน', 'err'); return; }
  histViewDate  = histDate;
  histViewShift = histSelectedShift;
  isHistMode = true; isEditMode = false;
  document.body.classList.add('hist-readonly');
  unsubscribeRealtime();

  const shiftLabel = histSelectedShift === 'day' ? '☀️ 07:00–19:00' : '🌙 19:00–07:00';
  document.getElementById('hist-banner').classList.add('show');
  document.getElementById('hist-banner-info').textContent = shiftLabel + ' — ' + thaiDate(histDate);
  document.getElementById('page-title').textContent = shiftLabel + ' น. — ' + thaiDate(histDate);
  document.getElementById('hist-edit-btn').textContent = '✏️ แก้ไข';
  document.getElementById('hist-edit-btn').className   = 'hist-action-btn hist-edit-btn';
  document.getElementById('hist-save-btn').style.display = 'none';

  const local = loadLocalByKey(docKey(histDate, histSelectedShift));
  document.getElementById('shift-content').innerHTML = buildShiftHTML(histSelectedShift, local);
  restoreData(local, histSelectedShift);

  showLoading(true);
  const fbData = await fbGet(docKey(histDate, histSelectedShift));
  showLoading(false);
  if (fbData) {
    document.getElementById('shift-content').innerHTML = buildShiftHTML(histSelectedShift, fbData);
    restoreData(fbData, histSelectedShift);
  }
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  const editBtn = document.getElementById('hist-edit-btn');
  const saveBtn = document.getElementById('hist-save-btn');
  if (isEditMode) {
    document.body.classList.remove('hist-readonly');
    editBtn.textContent = '🔒 ล็อกการแก้ไข';
    editBtn.className   = 'hist-action-btn hist-edit-btn editing';
    saveBtn.style.display = 'inline-flex';
  } else {
    document.body.classList.add('hist-readonly');
    editBtn.textContent = '✏️ แก้ไข';
    editBtn.className   = 'hist-action-btn hist-edit-btn';
    saveBtn.style.display = 'none';
  }
}

async function saveHistEdits() {
  const orig = {date: currentDate, shift: currentShift};
  currentDate  = histViewDate;
  currentShift = histViewShift;
  const data = collectData();
  saveLocal(data);
  currentDate  = orig.date;
  currentShift = orig.shift;
  showLoading(true);
  try {
    await fbSet(docKey(histViewDate, histViewShift), data);
    showLoading(false);
    showToast('✅ บันทึกการแก้ไขสำเร็จ', 'ok');
    toggleEditMode();
  } catch(e) {
    showLoading(false);
    showToast('❌ Firebase Error: ' + e.message, 'err');

function exitHistMode() {
  isHistMode = false; isEditMode = false;

function buildShiftHTML(shift, data) {
  const isNight = shift === 'night';
  const hClass  = isNight ? 'night' : 'day';
  const thClass = isNight ? 'night-tbl' : '';
  const roleLabel = r => r === 'rn' ? 'RN' : r === 'pn' ? 'PN' : 'Admin Officer';
  const roleMap   = {rn:'RN', pn:'PN', aux:'AUX'};
  let html = `<div class="card"><div class="card-header ${hClass}">${isNight ? '🌙 19:00–07:00 น.' : '☀️ 07:00–19:00 น.'}</div>`;
  ['rn','pn','aux'].forEach(role => {
    const sid       = `${role}-${shift}`;
    const filtered  = staff.filter(s => s.role === roleMap[role]);
    const savedRows = (data && data[role]) || [];
    const rowCount  = Math.max(role === 'aux' ? 2 : 5, savedRows.length);
    html += `<div class="card-header section">${roleLabel(role)}
      <button class="add-row-btn" onclick="addRow('${sid}')" style="padding:5px 16px;border-radius:6px;border:1.5px solid var(--blue);background:white;color:var(--blue);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">+ เพิ่มแถว</button>
    </div>
    <table class="tbl ${thClass}"><thead><tr>
      <th style="width:42px">#</th>
      <th style="width:13%">ชื่อ-สกุล</th>
      <th style="width:200px">ทีม/ห้อง</th>
      <th>หน้าที่พิเศษ</th>
      <th style="width:110px">ลายเซ็น</th>
      <th style="width:70px">เข้า</th><th style="width:70px">ออก</th>
    </tr></thead><tbody id="${sid}">`;
    for (let i = 0; i < rowCount; i++) html += buildRow(i + 1, sid, filtered);
    html += `</tbody></table>`;
  });

  html += `<div class="inc-wrap"><div class="inc-title">📋 เรื่องแจ้ง / รายงานเหตุการณ์</div>
  <table class="inc-table">
  <thead><tr>
    <th style="background:var(--blue-mid);color:#fff;padding:9px 16px;text-align:left;font-size:14px;font-weight:600;border:1px solid #2a4a9a;width:65%">รายการ</th>
    <th style="background:var(--blue-mid);color:#fff;padding:9px 16px;text-align:center;font-size:14px;font-weight:600;border:1px solid #2a4a9a;width:70px">No</th>
    <th style="background:var(--blue-mid);color:#fff;padding:9px 16px;text-align:center;font-size:14px;font-weight:600;border:1px solid #2a4a9a;">Yes – ระบุรายละเอียด</th>
  </tr></thead><tbody>`;

  INC_ROWS.forEach(r => {
    if (r.isHeader) {
      html += `<tr class="criteria-header"><td colspan="3">${r.label}</td></tr>`;
    } else {
      html += `<tr>
        <td style="border:1px solid var(--border);padding:10px 16px">${r.label}</td>
        <td style="border:1px solid var(--border);padding:10px;text-align:center;vertical-align:middle">
          <input type="radio" name="${shift}_${r.k}" value="no" checked onchange="toggleYes('${shift}_${r.k}',false)" style="width:17px;height:17px;cursor:pointer">
        </td>
        <td style="border:1px solid var(--border);padding:10px 16px;vertical-align:top">
          <input type="radio" name="${shift}_${r.k}" value="yes" onchange="toggleYes('${shift}_${r.k}',true)" style="width:17px;height:17px;cursor:pointer;margin-right:6px">
          <div class="yes-box" id="yb_${shift}_${r.k}">
            <textarea placeholder="ระบุรายละเอียด..." id="yt_${shift}_${r.k}" style="width:100%;min-height:40px;resize:vertical;border:1.5px solid var(--blue-mid);border-radius:5px;padding:6px 10px;font-family:'Sarabun',sans-serif;font-size:14px;background:#f0f5ff;outline:none"></textarea>
          </div>
        </td>
      </tr>`;
    }
  });

  html += `</tbody></table>
  <div class="occ-wrap"><table class="occ-table">
    <tr>
      <th class="occ-label">Occurrence ที่สำคัญ</th><th class="occ-hn">ระบุ HN</th>
      <th class="occ-label">Occurrence ที่สำคัญ</th><th class="occ-hn">ระบุ HN</th>
    </tr>`;
  for (let i = 0; i < Math.max(OCC1.length, OCC2.length); i++) {
    const a = OCC1[i], b = OCC2[i];
    html += `<tr>
      <td class="occ-label">${a ? a.label : ''}</td>
      <td class="occ-hn"><input type="text" placeholder="HN" id="oc_${shift}_${a ? a.k : 'na'+i}"></td>
      <td class="occ-label">${b ? b.label : ''}</td>
      <td class="occ-hn"><input type="text" placeholder="HN" id="oc_${shift}_${b ? b.k : 'nb'+i}"></td>
    </tr>`;
  }
  html += `</table></div></div></div>`;
  return html;
}

function buildRowInner(num, sid, filteredStaff) {
  let opts = '<option value="">— เลือก —</option>';
  filteredStaff.forEach(s => { opts += `<option value="${s.name}">${s.name}</option>`; });
  return `
    <td class="num">${num}</td>
    <td><select class="cs" data-f="name">${opts}</select></td>
    <td><input class="ci" type="text" data-f="room" placeholder="ทีม/ห้อง"></td>
    <td><input class="ci" type="text" data-f="duty" placeholder="หน้าที่พิเศษ"></td>
    <td><input class="ci" type="text" data-f="sign" placeholder="ลายเซ็น"></td>
    <td><input class="ci" type="text" data-f="in"   placeholder="เวลา"></td>
    <td><input class="ci" type="text" data-f="out"  placeholder="เวลา"></td>`;
}

function buildRow(num, sid, filteredStaff) {
  return `<tr>${buildRowInner(num, sid, filteredStaff)}</tr>`;
}

function addRow(sid) {
  const tbody    = document.getElementById(sid); if (!tbody) return;
  const role     = sid.split('-')[0];
  const filtered = staff.filter(s => s.role === ({rn:'RN',pn:'PN',aux:'AUX'})[role]);
  const tr = document.createElement('tr');
  tr.innerHTML = buildRowInner(tbody.rows.length + 1, sid, filtered);
  tbody.appendChild(tr);
}

function toggleYes(key, show) {
  const el = document.getElementById('yb_' + key);
  if (el) el.classList.toggle('show', show);
}

// ══════════════════════════════════════════════════════
// COLLECT / RESTORE
// ══════════════════════════════════════════════════════
function collectData() {
  const shift = isHistMode ? histViewShift : currentShift;
  const out   = { date: isHistMode ? histViewDate : currentDate, shift, ward: WARD_ID };
  ['rn','pn','aux'].forEach(role => {
    const tbody = document.getElementById(`${role}-${shift}`);
    out[role] = tbody ? Array.from(tbody.rows).map(tr => {
      const row = {};
      tr.querySelectorAll('[data-f]').forEach(el => { row[el.dataset.f] = el.value || ''; });
      return row;
    }) : [];
  });
  out.incidents = {};
  INC_ROWS.forEach(r => {
    if (!r.hasRadio) return;
    const chk = document.querySelector(`input[name="${shift}_${r.k}"]:checked`);
    const txt = document.getElementById(`yt_${shift}_${r.k}`);
    out.incidents[r.k] = { v: chk ? chk.value : 'no', t: txt ? txt.value : '' };
  });
  out.occurrences = {};
  [...OCC1,...OCC2].forEach(r => {
    const el = document.getElementById(`oc_${shift}_${r.k}`);
    out.occurrences[r.k] = el ? el.value : '';
  });
  return out;
}

function restoreData(data, shift) {
  if (!data) return;
  ['rn','pn','aux'].forEach(role => {
    const rows  = data[role] || [];
    const tbody = document.getElementById(`${role}-${shift}`); if (!tbody) return;
    rows.forEach((rd, i) => {
      if (i >= tbody.rows.length) addRow(`${role}-${shift}`);
      const tr = tbody.rows[i]; if (!tr) return;
      tr.querySelectorAll('[data-f]').forEach(el => { if (rd[el.dataset.f]) el.value = rd[el.dataset.f]; });
    });
  });
  if (data.incidents) INC_ROWS.forEach(r => {
    if (!r.hasRadio) return;
    const inc   = data.incidents[r.k]; if (!inc) return;
    const radio = document.querySelector(`input[name="${shift}_${r.k}"][value="${inc.v}"]`);
    if (radio) { radio.checked = true; toggleYes(`${shift}_${r.k}`, inc.v === 'yes'); }
    const txt = document.getElementById(`yt_${shift}_${r.k}`);
    if (txt && inc.t) txt.value = inc.t;
  });
  if (data.occurrences) [...OCC1,...OCC2].forEach(r => {
    const el = document.getElementById(`oc_${shift}_${r.k}`);
    if (el && data.occurrences[r.k]) el.value = data.occurrences[r.k];
  });
}

// ══════════════════════════════════════════════════════
// LOCAL STORAGE
// ══════════════════════════════════════════════════════
function loadLocal() { return loadLocalByKey(docKey(currentDate, currentShift)); }
function loadLocalByKey(key) {
  try { return JSON.parse(localStorage.getItem('w15e_data_' + key)); }
  catch(e) { return null; }
}
function saveLocal(data) {
  localStorage.setItem('w15e_data_' + docKey(data.date, data.shift), JSON.stringify(data));
}

// ══════════════════════════════════════════════════════
// SAVE (manual)
// ══════════════════════════════════════════════════════
async function saveData() {
  const data = collectData();
  saveLocal(data);
  _skipNext = true; _isSaving = true;
  try {
    await fbSet(docKey(data.date, data.shift), data);
    showToast('✅ บันทึก Firebase เรียบร้อย', 'ok');
  } catch(e) {
    _skipNext = false;
    showToast('⚠️ บันทึก Local เท่านั้น (' + e.message + ')', 'err');
  } finally {
    _isSaving = false;
  }
}

function openModal() { renderStaffUI(); document.getElementById('staff-overlay').classList.add('open'); }
function closeModal() { document.getElementById('staff-overlay').classList.remove('open'); }

function renderStaffUI() {
  const el = document.getElementById('staff-list-ui');
  el.innerHTML = staff.length
    ? staff.map(s => `
        <div class="staff-item">
          <div><div class="si-name">${s.name}</div><div class="si-role">${s.role}</div></div>
          <button class="del-btn" onclick="delStaff('${s.id}')">✕</button>
        </div>`).join('')
    : '<p style="color:var(--muted);font-size:15px">ยังไม่มีรายชื่อ</p>';
}

async function addStaff() {
  const name = document.getElementById('new-name').value.trim();
  const role = document.getElementById('new-role').value;
  if (!name) return;
  staff.push({ id: 'S' + Date.now(), name, role });
  await saveStaff();
  renderStaffUI();
  document.getElementById('new-name').value = '';
  if (!isHistMode) { renderPageLocal(); subscribeRealtime(currentDate, currentShift); }
  showToast('✅ เพิ่มรายชื่อแล้ว', 'ok');
}

async function delStaff(id) {
  staff = staff.filter(s => s.id !== id);
  await saveStaff();
  renderStaffUI();
  if (!isHistMode) { renderPageLocal(); subscribeRealtime(currentDate, currentShift); }
}

document.getElementById('staff-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('confirm-overlay').addEventListener('click', function(e) { if (e.target === this) closeConfirm(); });

// Enter key ใน input ชื่อ → เพิ่มทันที
document.getElementById('new-name').addEventListener('keydown', function(e) {

});

// TOAST
// ══════════════════════════════════════════════════════
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3200);
}

init();
</script>
